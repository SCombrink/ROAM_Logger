name: Build Windows EXE

# This tells GitHub to run the build every time you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Setup Rust Compiler
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "ROAM Logger v__VERSION__"
          releaseBody: "Automated cloud build."
          releaseDraft: true
          prerelease: false
